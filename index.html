<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Fantasy RPG Prototype - Cross Platform Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<script>
// グローバル変数で選択されたデバイスモードを保持 ('pc' または 'mobile')
let deviceMode = 'pc';

// ==========================================
// デバイス選択シーン (スタート画面)
// ==========================================
class BootScene extends Phaser.Scene {
    constructor() { super('BootScene'); }

    preload() {
        // 最低限必要なボタンの仮グラフィック作成
        let drawBtn = (key, w, h, color) => {
            let g = this.make.graphics({x:0,y:0,add:false});
            g.fillStyle(color); g.fillRect(0,0,w,h);
            g.lineStyle(2, 0xffffff); g.strokeRect(0,0,w,h);
            g.generateTexture(key, w, h);
        };
        drawBtn('btn_bg', 260, 60, 0x222222);
    }

    create() {
        const cx = this.cameras.main.centerX;
        const cy = this.cameras.main.centerY;

        this.add.text(cx, cy - 120, "FANTASY RPG PROTOTYPE", { fontSize: '28px', fill: '#00ffcc', fontStyle: 'bold' }).setOrigin(0.5);
        this.add.text(cx, cy - 60, "プレイするデバイスを選択してください", { fontSize: '16px', fill: '#ffffff' }).setOrigin(0.5);

        // PCボタン
        let pcBtn = this.add.image(cx, cy + 20, 'btn_bg').setInteractive({ useHandCursor: true });
        let pcTxt = this.add.text(cx, cy + 20, "💻 パソコン (WASD / Mouse)", { fontSize: '16px', fill: '#fff' }).setOrigin(0.5);
        
        // スマホボタン
        let mobileBtn = this.add.image(cx, cy + 100, 'btn_bg').setInteractive({ useHandCursor: true });
        let mobileTxt = this.add.text(cx, cy + 100, "📱 スマホ (Touch / Pad)", { fontSize: '16px', fill: '#fff' }).setOrigin(0.5);

        // ホバー演出 (PC用)
        pcBtn.on('pointerover', () => { pcBtn.setTint(0x00ff88); pcTxt.setStyle({ fill: '#000' }); });
        pcBtn.on('pointerout', () => { pcBtn.clearTint(); pcTxt.setStyle({ fill: '#fff' }); });
        mobileBtn.on('pointerover', () => { mobileBtn.setTint(0x00ff88); mobileTxt.setStyle({ fill: '#000' }); });
        mobileBtn.on('pointerout', () => { mobileBtn.clearTint(); mobileTxt.setStyle({ fill: '#fff' }); });

        // クリックイベント
        pcBtn.on('pointerdown', () => { deviceMode = 'pc'; this.scene.start('MainScene'); });
        mobileBtn.on('pointerdown', () => { deviceMode = 'mobile'; this.scene.start('MainScene'); });
    }
}

// ==========================================
// データ構造の定義 & ゲームロジック
// ==========================================
const WEAPON_DATA = {
    bareHands:   { name: "素手", damage: 10, cooldown: 350, range: 60, type: "melee", color: 0xaaaaaa, scaleX: 1.0, scaleY: 0.2, hitStop: 40, shake: 0.005, multiHit: 1 },
    greatSword:  { name: "大剣", damage: 45, cooldown: 800, range: 100, type: "melee", color: 0xff3333, scaleX: 1.8, scaleY: 0.6, hitStop: 120, shake: 0.02, multiHit: 1 },
    magicWand:   { name: "魔導の杖", damage: 25, cooldown: 400, range: 500, type: "ranged", color: 0x3399ff, bulletSpeed: 550, hitStop: 20, shake: 0.003, multiHit: 1 },
    dualBlades:  { name: "双剣", damage: 8, cooldown: 220, range: 70, type: "melee", color: 0xffcc00, scaleX: 1.1, scaleY: 0.15, hitStop: 20, shake: 0.004, multiHit: 3 }
};

const ENEMY_TYPES = [
    { name: "スライム", color: 0x33ccff, minSize: 12, maxSize: 16, speed: 80,  hp: 30,  exp: 15,  atk: 8,  defense: 2 },
    { name: "ゴブリン", color: 0x33ff33, minSize: 16, maxSize: 22, speed: 140, hp: 60,  exp: 35,  atk: 14, defense: 5 },
    { name: "オーク",   color: 0xff3333, minSize: 26, maxSize: 36, speed: 60,  hp: 150, exp: 100, atk: 28, defense: 12 },
    { name: "一ツ目",   color: 0x9933ff, minSize: 18, maxSize: 24, speed: 110, hp: 80,  exp: 55,  atk: 20, defense: 7 }
];

class Player extends Phaser.Physics.Arcade.Sprite {
    constructor(scene, x, y) {
        super(scene, x, y, 'player');
        scene.add.existing(this);
        scene.physics.add.existing(this);
        this.setCircle(16).setCollideWorldBounds(true).setDrag(2000).setMaxVelocity(350);
        this.tint = 0x00ff88;

        this.level = 1; this.exp = 0; this.nextExp = 50;
        this.maxHp = 100; this.hp = 100; this.maxMp = 30; this.mp = 30;
        this.baseAtk = 0; this.baseDef = 5;

        this.inventory = [{ type: 'weapon', key: 'bareHands', count: 1 }];
        this.equippedWeaponKey = 'bareHands';
        this.lastAttackTime = 0;
    }

    get attack() { return this.baseAtk + WEAPON_DATA[this.equippedWeaponKey].damage; }
    get weapon() { return WEAPON_DATA[this.equippedWeaponKey]; }

    update(cursors, keys, isAutoAttack, targetEnemy, joystickVector) {
        let accelX = 0, accelY = 0;
        const accelConst = 2500;

        if (deviceMode === 'pc') {
            if (cursors.left.isDown || keys.A.isDown) accelX = -accelConst;
            else if (cursors.right.isDown || keys.D.isDown) accelX = accelConst;
            if (cursors.up.isDown || keys.W.isDown) accelY = -accelConst;
            else if (cursors.down.isDown || keys.S.isDown) accelY = accelConst;
            this.setAcceleration(accelX, accelY);
        } else if (deviceMode === 'mobile' && joystickVector) {
            // ジョイスティックによる移動制限
            this.setAcceleration(joystickVector.x * accelConst, joystickVector.y * accelConst);
        }

        // 向きの制御
        if (isAutoAttack && targetEnemy) {
            this.setRotation(Phaser.Math.Angle.Between(this.x, this.y, targetEnemy.x, targetEnemy.y));
        } else if (deviceMode === 'pc') {
            let pointer = this.scene.input.activePointer;
            this.setRotation(Phaser.Math.Angle.Between(this.x, this.y, pointer.worldX, pointer.worldY));
        } else if (deviceMode === 'mobile' && joystickVector && (joystickVector.x !== 0 || joystickVector.y !== 0)) {
            // スマホかつ非オート時は、移動している方向を向く
            this.setRotation(Math.atan2(joystickVector.y, joystickVector.x));
        }
    }

    gainExp(amount) {
        this.exp += amount;
        this.scene.showPopup(this.x, this.y - 40, `+${amount} Exp`, 0xffff00);
        if (this.exp >= this.nextExp) this.levelUp();
    }

    levelUp() {
        this.exp -= this.nextExp; this.level++;
        this.nextExp = Math.floor(this.nextExp * 1.5);
        this.maxHp += 20; this.maxMp += 8; this.baseAtk += 5; this.baseDef += 3;
        this.hp = this.maxHp; this.mp = this.maxMp;
        this.scene.showPopup(this.x, this.y - 60, `LEVEL UP! Lv.${this.level}`, 0x00ffff, 24);
        this.scene.cameras.main.flash(300, 0, 255, 255);
    }

    takeDamage(amount) {
        let netDamage = Math.max(1, Math.round(amount - this.baseDef));
        this.hp -= netDamage;
        this.scene.cameras.main.shake(100, 0.01);
        this.scene.showPopup(this.x, this.y - 20, `-${netDamage}`, 0xff0000, 20);
        if (this.hp <= 0) { this.hp = 0; this.scene.gameOver(); }
    }

    usePotion() {
        const potionIdx = this.inventory.findIndex(item => item.type === 'potion');
        if (potionIdx !== -1) {
            this.hp = Math.min(this.maxHp, this.hp + 50);
            this.scene.showPopup(this.x, this.y - 30, "+50 HP", 0x00ff00);
            this.inventory[potionIdx].count--;
            if (this.inventory[potionIdx].count <= 0) this.inventory.splice(potionIdx, 1);
            return true;
        }
        this.scene.showPopup(this.x, this.y - 30, "ポーションが無い！", 0xffffff);
        return false;
    }

    cycleWeapon() {
        const weapons = this.inventory.filter(item => item.type === 'weapon');
        if (weapons.length <= 1) return;
        let currentIdx = weapons.findIndex(w => w.key === this.equippedWeaponKey);
        let nextIdx = (currentIdx + 1) % weapons.length;
        this.equippedWeaponKey = weapons[nextIdx].key;
        this.scene.showPopup(this.x, this.y - 30, `${this.weapon.name} に切替`, 0x00ffcc);
    }
}

class Enemy extends Phaser.Physics.Arcade.Sprite {
    constructor(scene, x, y, config) {
        super(scene, x, y, 'enemy_rect');
        scene.add.existing(this);
        scene.physics.add.existing(this);
        this.config = config; this.hp = config.hp; this.maxHp = config.hp;
        let randomScale = Phaser.Math.FloatBetween(config.minSize, config.maxSize) / 16;
        this.setScale(randomScale);
        if(Phaser.Math.Between(0, 1) === 1) this.setCircle(16); else this.setSize(32, 32);
        this.tint = config.color;
    }
    update(player) {
        if (!player.active) return;
        let angle = Phaser.Math.Angle.Between(this.x, this.y, player.x, player.y);
        this.setVelocity(Math.cos(angle) * this.config.speed, Math.sin(angle) * this.config.speed);
    }
    takeDamage(amount, weapon) {
        this.hp -= amount;
        this.scene.triggerHitStop(weapon.hitStop);
        this.scene.sparks.explode(Phaser.Math.Between(4, 8), this.x, this.y);
        this.scene.cameras.main.shake(80, weapon.shake);
        this.scene.showPopup(this.x, this.y - 15, Math.round(amount), 0xffffff, 22);
        this.scene.tweens.add({ targets: this, scaleX: this.scaleX * 1.3, scaleY: this.scaleY * 0.7, duration: 50, yoyo: true });
        if (this.hp <= 0) {
            this.scene.player.gainExp(this.config.exp);
            if(Phaser.Math.Between(1, 100) <= 40) this.scene.spawnChest(this.x, this.y);
            this.destroy();
        }
    }
}

// ==========================================
// メインゲームシーン
// ==========================================
class MainScene extends Phaser.Scene {
    constructor() { super('MainScene'); }

    preload() {
        let drawTex = (key, f) => { let g = this.make.graphics({x:0,y:0,add:false}); f(g); g.generateTexture(key, 32, 32); };
        drawTex('player',     g => { g.fillStyle(0xffffff); g.fillCircle(16,16,16); g.fillStyle(0x000,0.6); g.fillRect(16,12,12,8); });
        drawTex('enemy_rect', g => { g.fillStyle(0xffffff); g.fillRect(0,0,32,32); });
        drawTex('chest',      g => { g.fillStyle(0xd4af37); g.fillRect(2,6,28,20); g.fillStyle(0x8b5a2b); g.fillRect(2,14,28,3); });
        drawTex('bullet',     g => { g.fillStyle(0xffffff); g.fillCircle(16,16,6); });
        drawTex('potion',     g => { g.fillStyle(0xff3366); g.fillCircle(16,20,10); g.fillStyle(0xffffff); g.fillRect(13,6,6,8); });
        drawTex('slash',      g => { g.fillStyle(0xffffff); g.fillRect(0,8,32,16); });
        drawTex('spark',      g => { g.fillStyle(0xffffff); g.fillCircle(16,16,4); });

        // スマホ用UIグラフィックの生成
        let drawUI = (key, r, color) => {
            let g = this.make.graphics({x:0,y:0,add:false});
            g.fillStyle(color, 0.4); g.fillCircle(r,r,r);
            g.lineStyle(2, 0xffffff, 0.8); g.strokeCircle(r,r,r);
            g.generateTexture(key, r*2, r*2);
        };
        drawUI('joy_base', 50, 0x555555);
        drawUI('joy_thumb', 25, 0xcccccc);
        drawUI('btn_round', 30, 0x222222);
    }

    create() {
        this.physics.world.setBounds(0, 0, 3000, 3000);
        this.hitStopTimer = 0;
        this.isMenuOpen = false;
        this.menuIndex = 0;
        
        // スマホモードの場合は最初からオート攻撃を有効にして遊びやすくする
        this.isAutoAttack = (deviceMode === 'mobile');

        // 背景グリッド
        let grid = this.add.graphics();
        grid.lineStyle(1, 0x1a1a1a, 1);
        for(let x=0; x<3000; x+=50) grid.lineBetween(x, 0, x, 3000);
        for(let y=0; y<3000; y+=50) grid.lineBetween(0, y, 3000, y);

        this.enemies = this.physics.add.group();
        this.bullets = this.physics.add.group();
        this.chests = this.physics.add.group();

        this.player = new Player(this, 1500, 1500);
        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
        this.cameras.main.setBounds(0, 0, 3000, 3000);

        for(let i=0; i<15; i++) this.spawnChest(Phaser.Math.Between(200, 2800), Phaser.Math.Between(200, 2800));

        this.sparks = this.add.particles(0, 0, 'spark', {
            speed: { min: 120, max: 280 }, angle: { min: 0, max: 360 }, scale: { start: 1.5, end: 0 },
            lifespan: 250, tint: [0xffaa00, 0xff3300], emitting: false
        });

        this.physics.add.overlap(this.bullets, this.enemies, this.handleBulletHit, null, this);
        this.physics.add.overlap(this.player, this.chests, this.handleChestOverlap, null, this);
        this.physics.add.collider(this.enemies, this.enemies);

        this.cursors = this.input.keyboard.createCursorKeys();
        this.keys = this.input.keyboard.addKeys('W,A,S,D,E,B,P,Q,ENTER,SPACE');

        this.time.addEvent({ delay: 1200, callback: this.spawnRandomEnemy, callbackScope: this, loop: true });

        this.createOverlayUI();

        // スマホ用バーチャルパッド構築
        this.joystickVector = { x: 0, y: 0 };
        if (deviceMode === 'mobile') {
            this.setupMobileControls();
        }
    }

    update(time, delta) {
        if (this.hitStopTimer > 0) {
            this.hitStopTimer -= delta;
            this.physics.world.pause();
            return;
        } else {
            this.physics.world.resume();
        }

        if (this.isMenuOpen) {
            this.handleMenuInput();
            return;
        }

        let closestEnemy = this.getClosestEnemy();

        this.player.update(this.cursors, this.keys, this.isAutoAttack, closestEnemy, this.joystickVector);
        this.enemies.getChildren().forEach(e => e.update(this.player));

        this.physics.overlap(this.player, this.enemies, (p, e) => {
            p.takeDamage(e.config.atk * (delta / 1000));
        });

        // 攻撃判定
        let pointer = this.input.activePointer;
        let canAttack = time > this.player.lastAttackTime + this.player.weapon.cooldown;

        if (canAttack) {
            if (this.isAutoAttack && closestEnemy) {
                this.executeAttack(time, closestEnemy);
            } else if (!this.isAutoAttack && deviceMode === 'pc' && pointer.isDown) {
                this.executeAttack(time, null);
            }
        }

        // キーイベント(PC用)
        if (deviceMode === 'pc') {
            if (Phaser.Input.Keyboard.JustDown(this.keys.SPACE)) this.toggleAutoAttack();
            if (Phaser.Input.Keyboard.JustDown(this.keys.B)) this.toggleInventoryMenu();
            if (Phaser.Input.Keyboard.JustDown(this.keys.P)) this.player.usePotion();
            if (Phaser.Input.Keyboard.JustDown(this.keys.Q)) this.player.cycleWeapon();
        }

        this.updateUI();
    }

    toggleAutoAttack() {
        this.isAutoAttack = !this.isAutoAttack;
        this.showPopup(this.player.x, this.player.y - 40, this.isAutoAttack ? "AUTO MODE ON" : "AUTO MODE OFF", this.isAutoAttack ? 0x00ff00 : 0xff3333);
    }

    setupMobileControls() {
        const h = window.innerHeight;
        const w = window.innerWidth;

        // ジョイスティックベース
        let joyBase = this.add.image(100, h - 100, 'joy_base').setScrollFactor(0).setDepth(200).setInteractive();
        let joyThumb = this.add.image(100, h - 100, 'joy_thumb').setScrollFactor(0).setDepth(201);

        this.input.setTopOnly(false);

        joyBase.on('pointerdown', (pointer) => { this.joyPointer = pointer; });
        this.input.on('pointermove', (pointer) => {
            if (this.joyPointer && (this.joyPointer.id === pointer.id)) {
                let dist = Phaser.Math.Distance.Between(joyBase.x, joyBase.y, pointer.x, pointer.y);
                let angle = Phaser.Math.Angle.Between(joyBase.x, joyBase.y, pointer.x, pointer.y);
                
                let maxDist = 50;
                let targetDist = Math.min(dist, maxDist);

                joyThumb.x = joyBase.x + Math.cos(angle) * targetDist;
                joyThumb.y = joyBase.y + Math.sin(angle) * targetDist;

                this.joystickVector.x = (joyThumb.x - joyBase.x) / maxDist;
                this.joystickVector.y = (joyThumb.y - joyBase.y) / maxDist;
            }
        });

        let stopJoystick = (pointer) => {
            if (this.joyPointer && (this.joyPointer.id === pointer.id)) {
                this.joyPointer = null;
                joyThumb.x = joyBase.x;
                joyThumb.y = joyBase.y;
                this.joystickVector.x = 0;
                this.joystickVector.y = 0;
            }
        };
        this.input.on('pointerup', stopJoystick);

        // タッチ用UIボタン配置（画面右側）
        let createMobileBtn = (x, y, label, callback) => {
            let btn = this.add.image(w - x, h - y, 'btn_round').setScrollFactor(0).setDepth(200).setInteractive();
            let txt = this.add.text(w - x, h - y, label, { fontSize: '14px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5).setScrollFactor(0).setDepth(201);
            btn.on('pointerdown', () => { btn.setTint(0x00ffcc); callback(); });
            btn.on('pointerup', () => btn.clearTint());
            return btn;
        };

        createMobileBtn(70, 70, 'BAG', () => this.toggleInventoryMenu());
        createMobileBtn(150, 60, 'Q', () => this.player.cycleWeapon());
        createMobileBtn(70, 150, 'P', () => this.player.usePotion());

        // 右上のオート切り替えボタン
        let autoBtn = this.add.image(w - 100, 40, 'btn_bg').setScrollFactor(0).setDepth(200).setInteractive().setScale(0.6, 0.7);
        let autoTxt = this.add.text(w - 100, 40, 'AUTO SWITCH', { fontSize: '11px', fill: '#fff' }).setOrigin(0.5).setScrollFactor(0).setDepth(201);
        autoBtn.on('pointerdown', () => {  this.toggleAutoAttack(); });
    }

    getClosestEnemy() {
        let activeEnemies = this.enemies.getChildren();
        if (activeEnemies.length === 0) return null;
        let closest = null; let minDist = Infinity;
        activeEnemies.forEach(enemy => {
            let dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, enemy.x, enemy.y);
            if (dist < minDist) { minDist = dist; closest = enemy; }
        });
        return closest;
    }

    spawnRandomEnemy() {
        if (this.enemies.getLength() > 45) return;
        let angle = Phaser.Math.FloatBetween(0, Math.PI * 2);
        let dist = Phaser.Math.Between(500, 850);
        let x = Phaser.Math.Clamp(this.player.x + Math.cos(angle) * dist, 50, 2950);
        let y = Phaser.Math.Clamp(this.player.y + Math.sin(angle) * dist, 50, 2950);
        let typeConfig = ENEMY_TYPES[Phaser.Math.Between(0, ENEMY_TYPES.length - 1)];
        this.enemies.add(new Enemy(this, x, y, typeConfig));
    }

    spawnChest(x, y) { this.chests.create(x, y, 'chest').setImmovable(true); }

    handleChestOverlap(player, chest) {
        chest.destroy();
        this.cameras.main.flash(100, 255, 215, 0, 0.3);
        if (Phaser.Math.Between(1, 100) <= 45) {
            let exist = player.inventory.find(item => item.type === 'potion');
            if(exist) exist.count++; else player.inventory.push({ type: 'potion', name: '回復ポーション', count: 1 });
            this.showPopup(player.x, player.y - 30, "宝箱: 回復ポーションを入手！", 0xff3366);
        } else {
            const wKeys = Object.keys(WEAPON_DATA).filter(k => k !== 'bareHands');
            let pickedKey = wKeys[Phaser.Math.Between(0, wKeys.length - 1)];
            let exist = player.inventory.find(item => item.key === pickedKey);
            if(!exist) {
                player.inventory.push({ type: 'weapon', key: pickedKey, name: WEAPON_DATA[pickedKey].name, count: 1 });
                this.showPopup(player.x, player.y - 30, `宝箱: 武器『${WEAPON_DATA[pickedKey].name}』を入手！`, 0x00ffcc);
            } else {
                let pot = player.inventory.find(item => item.type === 'potion');
                if(pot) pot.count++; else player.inventory.push({ type: 'potion', name: '回復ポーション', count: 1 });
                this.showPopup(player.x, player.y - 30, "宝箱: 武器重複のためポーションに変換", 0xff9900);
            }
        }
    }

    executeAttack(time, targetEnemy) {
        this.player.lastAttackTime = time;
        const weapon = this.player.weapon;
        for (let i = 0; i < weapon.multiHit; i++) {
            this.time.delayedCall(i * (weapon.cooldown / (weapon.multiHit + 1)), () => {
                if (!this.player.active) return;
                let angle = targetEnemy ? Phaser.Math.Angle.Between(this.player.x, this.player.y, targetEnemy.x, targetEnemy.y) : this.player.rotation;
                if (weapon.type === "melee") {
                    let rx = this.player.x + Math.cos(angle) * weapon.range;
                    let ry = this.player.y + Math.sin(angle) * weapon.range;
                    let slash = this.add.sprite(rx, ry, 'slash').setRotation(angle).setTint(weapon.color).setScale(weapon.scaleX, weapon.scaleY);
                    this.tweens.add({ targets: slash, alpha: 0, scaleY: 0, duration: 120, onComplete: () => slash.destroy() });
                    this.enemies.getChildren().forEach(enemy => {
                        if (Phaser.Math.Distance.Between(rx, ry, enemy.x, enemy.y) < 40 + (weapon.range * 0.4)) {
                            enemy.takeDamage(this.player.attack, weapon);
                        }
                    });
                } else {
                    let bullet = this.bullets.create(this.player.x, this.player.y, 'bullet').setTint(weapon.color);
                    bullet.setVelocity(Math.cos(angle) * weapon.bulletSpeed, Math.sin(angle) * weapon.bulletSpeed);
                    bullet.weaponConfig = weapon; bullet.damage = this.player.attack;
                    this.time.delayedCall(1500, () => { if(bullet.active) bullet.destroy(); });
                }
            });
        }
    }

    handleBulletHit(bullet, enemy) { enemy.takeDamage(bullet.damage, bullet.weaponConfig); bullet.destroy(); }
    triggerHitStop(duration) { this.hitStopTimer = duration; }

    createOverlayUI() {
        this.uiContainer = this.add.container(0, 0).setScrollFactor(0).setDepth(100);
        this.statusText = this.add.text(20, 20, '', { fontSize: '15px', fill: '#fff', stroke: '#000', strokeThickness: 3 });
        this.uiContainer.add(this.statusText);

        this.menuBg = this.add.graphics();
        this.menuBg.fillStyle(0x111111, 0.95).fillRect(200, 60, 400, 400).lineStyle(3, 0xffffff).strokeRect(200, 60, 400, 400);
        this.menuBg.setVisible(false);
        this.uiContainer.add(this.menuBg);

        this.menuTitle = this.add.text(400, 80, '--- BAG (INVENTORY) ---', { fontSize: '18px', fill: '#00ffcc' }).setOrigin(0.5).setVisible(false);
        this.uiContainer.add(this.menuTitle);
        this.menuItemTexts = [];
    }

    updateUI() {
        let p = this.player;
        let autoStatus = this.isAutoAttack ? "ON (最至近ターゲット)" : "OFF (手動照準)";
        let guideStr = (deviceMode === 'pc') ? `[SPACE]:オート切替 [B]:バッグ [P]:ポーション [Q]:武器切替` : `画面のボタンをタッチして操作`;

        this.statusText.setText(
            `PLAYER: Lv.${p.level} | MODE: ${deviceMode.toUpperCase()}\n` +
            `HP:  ${Math.ceil(p.hp)} / ${p.maxHp}\n` +
            `ATK: ${p.attack} | DEF: ${p.baseDef} | EXP: ${p.exp}/${p.nextExp}\n` +
            `AUTO ATTACK: ${autoStatus} | EQUIP: [${p.weapon.name}]\n` +
            `${guideStr}`
        );
    }

    toggleInventoryMenu() {
        this.isMenuOpen = !this.isMenuOpen;
        this.menuBg.setVisible(this.isMenuOpen);
        this.menuTitle.setVisible(this.isMenuOpen);
        this.menuIndex = 0;
        this.refreshMenuTexts();
    }

    refreshMenuTexts() {
        this.menuItemTexts.forEach(t => t.destroy());
        this.menuItemTexts = [];
        if (!this.isMenuOpen) return;

        this.player.inventory.forEach((item, idx) => {
            let nameStr = item.type === 'weapon' ? `${WEAPON_DATA[item.key].name}` : `${item.name} x${item.count}`;
            if (item.key === this.player.equippedWeaponKey) nameStr += " (E)";

            let isSelected = idx === this.menuIndex;
            let itemText = this.add.text(400, 130 + idx * 35, (isSelected ? "> " : "  ") + nameStr, {
                fontSize: '16px', fill: isSelected ? '#ffff00' : '#ffffff'
            }).setOrigin(0.5).setInteractive();

            itemText.on('pointerdown', () => { 
                this.menuIndex = idx; 
                this.useSelectedInventoryItem(); 
                // スマホ用：タップしたら即時使用/装備
                if(deviceMode === 'mobile') this.toggleInventoryMenu(); 
            });
            this.uiContainer.add(itemText);
            this.menuItemTexts.push(itemText);
        });
    }

    handleMenuInput() {
        if (deviceMode === 'mobile') return; // スマホはタッチ処理のためキー入力を無視
        if (Phaser.Input.Keyboard.JustDown(this.keys.B)) { this.toggleInventoryMenu(); return; }
        let invLen = this.player.inventory.length; if (invLen === 0) return;
        if (Phaser.Input.Keyboard.JustDown(this.cursors.up)) { this.menuIndex = (this.menuIndex - 1 + invLen) % invLen; this.refreshMenuTexts(); }
        if (Phaser.Input.Keyboard.JustDown(this.cursors.down)) { this.menuIndex = (this.menuIndex + 1) % invLen; this.refreshMenuTexts(); }
        if (Phaser.Input.Keyboard.JustDown(this.keys.ENTER)) { this.useSelectedInventoryItem(); }
    }

    useSelectedInventoryItem() {
        let item = this.player.inventory[this.menuIndex]; if (!item) return;
        if (item.type === 'weapon') {
            this.player.equippedWeaponKey = item.key;
            this.showPopup(this.player.x, this.player.y - 30, `${WEAPON_DATA[item.key].name} 装備`, 0x00ffcc);
        } else if (item.type === 'potion') { this.player.usePotion(); }
        this.refreshMenuTexts(); this.updateUI();
    }

    showPopup(x, y, msg, color, size = 14) {
        let t = this.add.text(x, y, msg, { fontSize: `${size}px`, fill: '#' + color.toString(16), fontStyle: 'bold', stroke:'#000', strokeThickness:3 }).setOrigin(0.5).setDepth(200);
        this.tweens.add({ targets: t, y: y - 50, alpha: 0, duration: 800, onComplete: () => t.destroy() });
    }

    gameOver() {
        this.physics.pause();
        this.add.text(this.cameras.main.centerX, this.cameras.main.centerY, "GAME OVER\n\nタップ/クリックでリスタート", {
            fontSize: '32px', fill: '#ff0000', align: 'center', fontStyle: 'bold'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(1000);
        this.input.once('pointerdown', () => { this.scene.start('BootScene'); });
    }
}

// ==========================================
// メイン起動設定
// ==========================================
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH },
    parent: 'game-container',
    physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
    scene: [BootScene, MainScene] // 開始時にBootSceneを呼び出す
};

const game = new Phaser.Game(config);
window.addEventListener('resize', () => { game.scale.resize(window.innerWidth, window.innerHeight); });
</script>
